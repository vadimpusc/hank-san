<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Filmmaker Portfolio | Director, Cinematographer, Editor</title>
    <meta
      name="description"
      content="A modern filmmaker portfolio showcasing narrative, commercial, and music video work. Watch reels, browse stills, and view credits."
    />
    <link rel="canonical" href="https://example.com/" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Filmmaker Portfolio" />
    <meta
      property="og:description"
      content="Selected work across narrative, commercial, and music videos."
    />
    <meta property="og:url" content="https://example.com/" />
    <meta property="og:image" content="https://example.com/og.jpg" />

    <meta name="twitter:card" content="summary_large_image" />

    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://player.vimeo.com" />
    <link rel="preconnect" href="https://www.youtube-nocookie.com" />

    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (!t) {
            t = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {
          /* ignore */
        }
      })();
    </script>

    <script type="application/ld+json" id="schema-static">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "WebSite",
            "name": "Filmmaker Portfolio",
            "url": "https://example.com/"
          },
          {
            "@type": "Person",
            "name": "Hank Orion",
            "jobTitle": "Filmmaker",
            "url": "https://example.com/",
            "sameAs": [
              "https://www.instagram.com/",
              "https://vimeo.com/",
              "https://www.imdb.com/"
            ]
          }
        ]
      }
    </script>
    <script type="application/ld+json" id="schema-dynamic"></script>
  </head>

  <body>
    <div id="app"></div>
    <script type="module" src="/src/entries/home.js"></script>
  </body>
</html>
