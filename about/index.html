<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>About | Filmmaker Portfolio</title>
    <meta
      name="description"
      content="About the filmmaker, approach, awards, and credits. Based in London and available worldwide."
    />
    <link rel="canonical" href="https://example.com/about/" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="About | Filmmaker Portfolio" />
    <meta property="og:description" content="Bio, approach, awards, and credits." />
    <meta property="og:url" content="https://example.com/about/" />
    <meta property="og:image" content="https://example.com/og.jpg" />

    <meta name="twitter:card" content="summary_large_image" />

    <link rel="icon" href="../favicon.svg" type="image/svg+xml" />

    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (!t) {
            t = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {
          /* ignore */
        }
      })();
    </script>

    <script type="application/ld+json" id="schema-static">
      {
        "@context": "https://schema.org",
        "@type": "AboutPage",
        "name": "About",
        "url": "https://example.com/about/"
      }
    </script>
    <script type="application/ld+json" id="schema-dynamic"></script>
  </head>

  <body>
    <div id="app"></div>
    <script type="module" src="/src/entries/about.js"></script>
  </body>
</html>
